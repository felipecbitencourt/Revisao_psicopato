<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Psico · Pato — guia de estudos</title>
  <meta name="description" content="Psico·Pato — plataforma de revisão de conteúdos e exercícios sobre o DSM-5-TR.">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,600;12..96,700;12..96,800&family=Hanken+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
  <link rel="icon" type="image/png" sizes="48x48" href="favicon-48.png">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">

  <!-- PWA (instalável como app no desktop e no celular) -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0E4D64">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Psico·Pato">

  <link rel="stylesheet" href="styles.css?v=29">
  <!-- painel de acessibilidade (a11y-kit) -->
  <link rel="stylesheet" href="a11y-kit/a11y-kit.css?v=2">
  <!-- o botão é colocado no header do app; escondemos o FAB flutuante padrão -->
  <style>.ak-fab{display:none !important;}</style>
</head>
<body>
  <div id="app"></div>
  <!-- Supabase (auth + banco) -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
  <!-- conteúdo real do DSM-5-TR, gerado por build_content.py -->
  <script src="content.js?v=4"></script>
  <!-- camada de dados (fala com o Supabase) -->
  <script src="db.js?v=25"></script>
  <script src="app.js?v=43"></script>
  <!-- A11y Kit: inicia e expõe a API global (o app abre via botão do header) -->
  <script src="a11y-kit/a11y-kit.js?v=2"></script>
  <script>
    window.A11Y = A11yKit.init({
      storageKey: 'psp-a11y',
      contentSelector: '#app',          // elemento estável (o app recria só o innerHTML)
      readSelector: '.content h1,.content h2,.content h3,.content p,.content li',
      textSelector: '.content h1,.content h2,.content h3,.content p,.content li',
      draggable: false,
      theme: { accent: '#0E4D64' },
      // o app já tem dark próprio; descrição de imagens desativada por ora
      features: { dark: false, vlibras: false, translate: true, imageDesc: false },
      // tradução via Google: PT/EN/ES no simplificado; mais idiomas no avançado
      translateSimple:   [['pt', 'PT'], ['en', 'EN'], ['es', 'ES']],
      translateAdvanced: [['pt', 'Português'], ['fr', 'Français'], ['it', 'Italiano'], ['ht', 'Kreyòl ayisyen'], ['de', 'Deutsch']],
    });
  </script>
  <!-- PWA: registra o service worker e captura o convite de instalação -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('service-worker.js').catch(function () {});
      });
    }
    // guarda o evento para o app mostrar um botão "Instalar app"
    window.addEventListener('beforeinstallprompt', function (e) {
      e.preventDefault();
      window.__pwaPrompt = e;
      if (window.__onPwaPrompt) window.__onPwaPrompt();
    });
    window.addEventListener('appinstalled', function () {
      window.__pwaPrompt = null;
      if (window.__onPwaPrompt) window.__onPwaPrompt();
    });
  </script>
</body>
</html>
